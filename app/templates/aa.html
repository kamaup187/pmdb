<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Sample</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Source Sans Pro', sans-serif;
        }

        body {
            background: #fff;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100%;
            margin: auto;
            padding: 0;
        }

        .receipt_header {
            text-align: center;
            padding-bottom: 5px;
            border-bottom: 1px dashed #000;
        }

        .receipt_header h1 {
            font-size: 16px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .receipt_header h1 span {
            display: block;
            font-size: 18px;
        }

        .receipt_header h2 {
            font-size: 10px;
            color: #727070;
            font-weight: 300;
        }

        .receipt_header h2 span {
            display: block;
            font-size: 10px;
        }

        .receipt_body {
            margin-top: 5px;
            padding: 0 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 2px 0;
        }

        th:last-child, td:last-child {
            text-align: right;
        }

        th, td {
            font-size: 10px;
            border-bottom: 1px solid #ddd;
        }

        tfoot th, tfoot td {
            font-weight: bold;
            border-top: 1px solid #000;
        }

        h3 {
            margin-top: 5px;
            font-size: 12px;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    
<div class="container">
    
    <div class="receipt_header">
        <h1>Receipt of Sale <span>Shop Name</span></h1>
        <h2>Address: Lorem Ipsum, 1234-5 <span>Tel: +1 012 345 67 89</span></h2>
    </div>
    
    <div class="receipt_body">
        <table>
            <thead>
                <tr>
                    <th>QTY</th>
                    <th>ITEM</th>
                    <th>AMT</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Lorem ipsum</td>
                    <td>2.3</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Lorem ipsum</td>
                    <td>2.3</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Lorem ipsum</td>
                    <td>2.3</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Lorem ipsum</td>
                    <td>2.3</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td></td>
                    <td>32.1</td>
                </tr>
                <tr>
                    <td>Cash</td>
                    <td></td>
                    <td>32.1</td>
                </tr>
                <tr>
                    <td>Change</td>
                    <td></td>
                    <td>32.1</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <h3>Thank You!</h3>

</div>

</body>
</html>
