{% extends 'base2.html' %}

{% block content %}

<div class="containe">
    <div class="row">
        <div class="col-lg-6 offset-lg-3 no-padding">
            <div class="formwrapper">
                <div class="card shadow mb-1 bg-white">
                    <div class="card-header py-2 topbar-bg divjust-end" >
                        <h5 class="m-0 font-weight-bold text-white"><i class="fas fa-house-user mr-1"></i><span class="mobile-heading">Create housecode</span> <span id="prop" class="var-heading text-warning"> >> {{prop}}</span></h5>
                        <a href="{{ url_for('api.index') }}"><span class="text-white"><i class="fas fa-fw fa-times"></i></span></a>
                    </div>
                    <div class="card-body myforms">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div id="alert-msgs"class="noti-{{ category }} show" role="alert">
                                <span class="small"><i class="fas fa-fw fa-info-circle mr-2"></i>{{ message }}</span>
                            </div>
                        {% endfor %}
                        {% endwith %}
                    
                        <span class="hide">hide</span>
                        <form autocomplete="off" method="POST" action="/create/housecode">
                    
                          <div class="form-group input-icons">
                            <i class="fa fa-angle-double-down icon text-info"></i>
                            <select name="usergroup" class="form-control" style="text-align: center;" id ="select_apartment" >
                              <option disabled selected value> -- Select Apartment -- </option>
                              {% for o in props %}
                              <option value="{{ o }}">{{ o }}</option>
                              {% endfor %}
                            </select>
                          </div>
              
                          <div class="form-group input-icons">
                            <i class="fa fa-hashtag icon text-info"></i> 
                            <input id="enter_house_code" class="form-control input-field text-info" style="text-align: center;" type="text" name="housecode" placeholder="New housecode" required>
                          </div>
            
                          <div id="notifications"></div>

                          <div class="form-group input-icons">
                            <i class="fa fa-home icon text-info"></i> 
                            <input class="form-control input-field" type="text" name="rentrate" placeholder="Rent charge" required>
                          </div>

                          <div class="form-group input-icons">
                            <i class="fa fa-water icon text-info"></i> 
                            <input class="form-control input-field" type="text" name="waterrate" placeholder="Unit rate(water)" required>
                          </div>

                          <div class="form-group input-icons">
                            <i class="fa fa-trash-alt icon text-info"></i> 
                            <input class="form-control input-field" type="text" name="garbagerate" placeholder="Garbage fee" required>
                          </div>

                          <div class="form-group input-icons">
                            <i class="fa fa-dollar-sign icon text-info"></i> 
                            <input class="form-control input-field" type="text" name="securityrate" placeholder="Security fee" required>
                          </div>

                          <div class="form-group input-icons">
                            <i class="fa fa-percent icon text-info"></i> 
                            <input class="form-control input-field" type="text" name="finerate" placeholder="Fine percentage" required>
                          </div>
              
                          <input id="apvar" style="display: none;" type="text" name="apartmentsessionvariable">
            
                          
                          <div class="divbg center-btn">
                            <button type="submit" class="bg-gradient-success borderless text-white"><i class="fas fa-check mr-2"></i>Save</button>                          
                          </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='jquery.js') }}"></script>  

<script>
    setTimeout(function(){
    $("#alert-msgs").fadeOut(500,"swing");
    }, 2000);
</script>

<script>
$("#select_apartment").on('change',function(){
    var apartmentvar = $("#select_apartment").val();
    localStorage.setItem('apartmentvar',apartmentvar);
    var sessionapvar = localStorage.getItem('apartmentvar');
    console.log(sessionapvar);
    document.getElementById('apvar').value = sessionapvar;

    $.ajax({
            type: "POST",
            url: "{{ url_for('api.createhousecode') }}",
            data: {
                apartmentsessionvariable: localStorage.getItem('apartmentvar'),
                runapart:"somestring"
            },
            success: function(response) {
                $("#prop").html(response);
                $("#prop").removeClass("text-warning");
                $("#prop").addClass("text-info");
            }
        });
});
</script>

<script>
  $("#enter_house_code").keyup(function(){
  
      $.ajax({
        url: "{{ url_for('api.createhousecode') }}",
        type: "POST",
        data: {
                apartmentsessionvariable: localStorage.getItem('apartmentvar'),
                housecode: $("#enter_house_code").val(),
                runalert: "run"
            },
        success: function(response) {
          $("#notifications").html(response);
        },
        error: function(xhr) {
          //alert(xhr);
        }
      });
  });
  </script>
  
  <script>
    var sessionapvar = localStorage.getItem('apartmentvar');
    $('#apvar').val(sessionapvar);
  </script>
{% endblock %}
