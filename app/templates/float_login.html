        <title>Login</title>
        <link href="/static/css/style.css" rel="stylesheet" />

    </head>
    <body class="bg-primary-custom">
        <div id="layoutAuthentication">
            <div id="layoutAuthentication_content">
                <main>
                    <div class="container-xl px-4">
                        <div class="row justify-content-center">
                            <div class="col-lg-5">
                                <!-- Basic login form-->
                                <div class="card shadow-lg border-0 rounded-lg mt-5">
                                    <div class="card-header center-btn">
                                        <!-- <span class="text-125 font-weight-bold my-1">Login</span> -->
                                        <span class="d-none d-lg-inline"><a class="d-none d-lg-inline" href="/float/login"><img src="../static/float/img/beacon-logo.png" width="200" height="80" alt=""></a> | <span class="text-kodi-alt">Login</span></span>
                                        <span class="desktop-malaysian"><a class="" href="/float/login"><img src="../static/float/img/beacon-logo.png" width="150" height="60" alt=""></a> | <span class="text-kodi-alt">Login</span></span>
                                        <!-- <span class="text-right my-1">
                                            <a class="sidebar-brand bg-white d-flex align-items-center justify-content-center" href="{{ url_for('api.demo') }}">
                                                Demo
                                              </a>
                                        </span> -->
                                    </div>
                                    <div class="card-body">
                                        <!-- Login form-->
                                        <form method="POST" action="/float/login" autocomplete="off">

                                            <div id="branch-selector" class="mb-3">
                                                <label for="transaction-branch" class="form-label">Select branch</label>
                                                <select class="form-select" name="branch" id="transaction-branch">
                                                    <option disabled selected>Select branch below</option>
                                                    {% for o in branches%}
                                                    <option value="{{ o.id }}">{{ o.name }}</option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <!-- Form Group (email address)-->
                                            <div class="mb-3">
                                                <label class="small mb-1" for="inputEmailAddress">Staff ID</label>
                                                <input class="form-control" id="inputEmailAddress" name="identifier" type="text" placeholder="Enter Staff ID" />
                                            </div>
                                            <!-- Form Group (password)-->
                                            <div class="mb-3">
                                                <label class="small mb-1" for="inputPassword">Password</label>
                                                <input class="form-control" id="inputPassword" type="password" name="password" placeholder="Enter password" />
                                            </div>
                                            <!-- Form Group (remember password checkbox)-->
                                            <div class="mb-3">
                                                <div class="form-check">
                                                    <input class="form-check-input" id="rememberPasswordCheck" type="checkbox" value="" />
                                                    <label class="form-check-label" for="rememberPasswordCheck">Remember password</label>
                                                </div>
                                            </div>
                                            <!-- Form Group (login box)-->
                                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                                <!-- <button type="submit" class="btn btn-primary">Login</button> -->
                                                <button id="signin" class="btn cta-button">
                                                    Login
                                                </button>


                                                <!-- <div class="small text-kodi" >Forgot Password?</div> -->

                                                <div class="text-center">
                                                    <a style="color: #15a362;" href="/float/login">Forgot Password?</a>
                                                </div>

                                            </div>
                                        </form>
                                    </div>
                                    <!-- <div class="card-footer text-center">
                                        <div class="small"><a href="auth-register-basic.html">Need an account? Sign up!</a></div>
                                    </div> -->
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
            <div id="layoutAuthentication_footer">
                <footer class="footer-admin mt-auto footer-dark">
                    <div class="container-xl px-4">
                        <div class="row">
                            <div class="col-md-6 small">Copyright &copy; 2024 BeaconTechnologies</div>
                            <div class="col-md-6 text-md-end small">
                                <a href="#!">Privacy Policy</a>
                                &middot;
                                <a href="#!">Terms &amp; Conditions</a>
                            </div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="../static/jss/scripts.js"></script>
    </body>
</html>
