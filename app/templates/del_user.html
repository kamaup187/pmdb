{% extends "base.html" %}

{% block content %}
<div class="column is-4 is-offset-4">
    <p class="formtitle">Remove User</p>
    <div class="box">
        <form method="POST" action="/remove/user">
            <!-- <div class="field">
                <div class="control">
                    <input class="input is-large" type="text" name="name" placeholder="name" autofocus>
                </div>
            </div> -->
            <div class="input is-large">
                <select name="usercode" class="form-control" id ="url-box" >
                  <option disabled selected value> -- Select User -- </option>
                  {% for o in option_list %}
                  <option value="{{ o }}">{{ o }}</option>
                  {% endfor %}
                </select>
            </div>
            <br>
            <br>

            <button class="button is-block is-info is-large is-fullwidth">Delete user</button>
        </form>
    </div>
</div>
<div class="col-sm-5 col-sm-offset-1">
    <div>
      <h3>Notifications</h3>
    </div>
    {% if msgs %}
    <div class="notification is-success">
      {{msgs}}
    </div>
    {% endif %}
    
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="notification is-danger">
      {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}
  </div>
{% endblock %}
