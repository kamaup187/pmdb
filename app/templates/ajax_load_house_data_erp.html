

    <!-- Pie Chart -->
    <div class="col-12 no-padding">
        <div class="card shadow mb-1 bg-white">
            <!-- Card Header - Dropdown -->
            <div class="card-header py-2 d-flex flex-row align-items-center justify-content-between x-smallify">

                    <div class="font-weight-bold targetprop">
                        <span>(<span class="text-black targetprop">{{str_date}}</span>)</span>
                        <i class="fas fa-chevron-right text-info ml-1"></i>
                    </div>
                   
                    <div class="font-weight-bold">
                        <span class="text-black mr-1">{{numhouse}}</span>
                        <span class="text-primary">listed units</span>
                        <i class="fas fa-circle text-primary ml-1"></i>
                    </div>

                    <div class="font-weight-bold mobile-malaysian">
                        <span class="text-black mr-1">{{numalloc}}</span>
                        <span class="text-success">Booked ({{occupancy_rate}})</span>
                        <i class="fas fa-circle text-success ml-1"></i>
                    </div>

                    <div class="font-weight-bold">
                        <span class="text-black mr-1">{{numvac}}</span>
                        <span class="text-danger">Availabe ({{vacancy_rate}})</span>
                        <i class="fas fa-circle text-danger ml-1"></i>
                    </div>

            </div>
        </div>

    </div>
