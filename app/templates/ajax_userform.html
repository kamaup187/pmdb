    <!-- Main page content-->
    <span id="func" class="dispnone">{{target_func}}</span>
    <div id="workarea" class="container-xl px-4 mt-4">
        <div class="row">
            <div class="col-xl-4">
                <!-- Profile picture card-->
                <div class="card mb-4 mb-xl-0 d-none">
                    <div class="card-header">Profile Picture</div>
                    <div class="card-body text-center">
                        <!-- Profile picture image-->
                        <!-- <img class="img-account-profile rounded-circle mb-2" src="assets/img/illustrations/profiles/profile-1.png" alt="" /> -->
                        <i class="img-account-profile rounded-circle mb-2 fa-2x fas fa-user-alt"></i>

                        <!-- Profile picture help block-->
                        <div class="small font-italic text-muted mb-4">JPG or PNG</div>
                        <!-- Profile picture upload button-->
                        <button class="btn btn-primary" type="button" disabled>Upload new image</button>
                    </div>
                </div>

                <div class="card mb-1 mb-xl-0 mt-33">
                    <div class="card-header">Access Levels</div>
                    <div class="card-body text-center">
                        <fieldset class="mt-1">
                            <legend class="legend">Select roles:</legend>
                            <div class="text-left">

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="admin" value="admin">
                                    <label class="mr-3 me-3 hover-text" for="admin">Full system access</label>
                                  </div>
                                  <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="approve" value="approve">
                                    <label class="mr-3 me-3 hover-text" for="approve">Approve/Reject changes</label>
                                  </div>
                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="comms" value="comms">
                                    <label class="mr-3 me-3 hover-text" for="comms">Send Email/sms</label>
                                  </div>

                                  <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="props" value="props">
                                    <label class="mr-3 me-3 hover-text" for="props">Add Properties</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="tenants" value="tenants">
                                    <label class="mr-3 me-3 hover-text" for="tenants">Manage Tenants</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="users" value="users">
                                    <label class="mr-3 me-3 hover-text" for="users">Manage users & Roles</label>
                                  </div>

                                  <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="readonly" value="readonly">
                                    <label class="mr-3 me-3 hover-text" for="readonly">Read only access</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="payments" value="payments">
                                    <label class="mr-3 me-3 hover-text" for="payments">Post payments</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="invoices" value="invoices">
                                    <label class="mr-3 me-3 hover-text" for="invoices">Create invoices</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="reports" value="reports">
                                    <label class="mr-3 me-3 hover-text" for="reports">View reports</label>
                                  </div>

                                <div class="fancy-checkbox-group form-control mb-2 smallify">
                                    <input type="checkbox" name="rolecheckbox" id="demo" value="demo">
                                    <label class="mr-3 me-3 hover-text" for="demo">Demo mode</label>
                                  </div>

                            </div>
                        </fieldset>
                    </div>
                </div>
            </div>
            <div class="col-xl-8">
                <!-- Account details card-->
                <div class="card mb-4">
                    <div class="card-header">Account Details  (@{{user.username}})</div>
                    <div class="card-body">
                        <form autocomplete="off">
                            <!-- Form Row-->
                            <div class="gx-3 mb-3">
                                <!-- Form Group (first name)-->
                                <label class="small mb-1" for="inputName">Full name</label>
                                <input class="form-control" id="inputName" type="text" placeholder="Enter your full name" value="{{user.name}}" />
                                
                            </div>
                            <div class="row gx-3 mb-3">
                              <!-- Form Group (first name)-->
                              <div class="col-md-6">
                                  <label class="small mb-1" for="inputNatid">ID</label>
                                  <span id="idResp" class="ml-3"></span>

                                  <input class="form-control" id="inputNatid" type="text" placeholder="Enter your ID" value="{{user.national_id}}" />
                              </div>
                              <!-- Form Group (last name)-->
                              <div class="col-md-6">
                                  <label class="small mb-1" for="inputEmail">Email</label>
                                  <span id="emailResp" class="ml-3"></span>

                                  <input class="form-control" id="inputEmail" type="text" placeholder="Enter your Email" value="{{user.email}}" />
                              </div>
                          </div>
                          <div class="row gx-3 mb-3">
                            <!-- Form Group (first name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputTel">Mobile</label>
                                <span id="telResp" class="ml-3"></span>

                                <input class="form-control" id="inputTel" type="text" placeholder="Enter your mobile number" value="{{user.phone}}" />
                            </div>
                            <!-- Form Group (last name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputStatus">Select status</label>
                                <select id="inputStatus" class="form-control" aria-label="Default select example">
                                    <option selected disabled  value="">{{user_status}}</option>
                                    <option value="True">Active</option>
                                    <option value="False">Dormant</option>
                                </select>
                            </div>
                        </div>
                        <div class="row gx-3 mb-3">
                            <!-- Form Group (first name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="pass1">Reset password</label>
                                <span toggle="#pass1" class="fa fa-fw fa-eye small ml-3 toggle-password"></span>
                        
                                <input class="form-control" id="pass1" type="password" placeholder="****" autocomplete="new-password" value=""/>
                            </div>
                            <!-- Form Group (last name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="pass2">Re-type</label>
                                <span toggle="#pass2" class="fa fa-fw fa-eye small ml-2 mr-2 toggle-password"></span>
                                <span class="text-success small passmatch"></span>


                                <input class="form-control" id="pass2" type="password" placeholder="****" autocomplete="new-password" value=""/>
                            </div>
                        </div>
                        
                        
                            <!-- Form Group (Roles)-->
                            <div class="mb-3 form-group">
                                <label class="small mb-1">Group</label>
                                <select class="form-control" aria-label="Default select example" id="inputUsergroup">
                                    <option selected disabled>Select group:</option>
                                    <!-- <option disabled selected value> -- none selected -- </option> -->
                                    {% for o in groups %}
                                    <option value="{{ o }}">{{ o }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div id="bankdetails" class="row gx-3 mb-3 dispnone">
                                <!-- Form Group (first name)-->
                                <div class="col-md-6">
                                    <label class="small mb-1" for="bank">Bank & Branch</label>                            
                                    <input class="form-control" id="bank" type="text" placeholder="bank name & branch" value=""/>
                                </div>
                                <!-- Form Group (last name)-->
                                <div class="col-md-6">
                                    <label class="small mb-1" for="bankacc">Bank A/C</label>    
                                    <input class="form-control" id="bankacc" type="text" placeholder="A/C" value=""/>
                                </div>
                            </div>



                            <div class="mb-2 smallify">
                                Properties: <input type="checkbox" name="" id="propall" checked>
                                <label class="mr-3 me-3 text-danger" for="propall">Allocate all</label>
                              </div>

                            <fieldset id="propfield" class="mt-2 mb-3 dispnone">
                                <legend class="legend">Select properties:</legend>
                                <div id="propbed" class="mt-"></div>
                            </fieldset>

                            <!-- Submit button-->
                            <div class="text-center">
                                <button id="saveprofile" class="btn btn-primary" type="button">{{savecontext}}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>




<script>
    $(".toggle-password").click(function() {
  
        $(this).toggleClass("fa-eye fa-eye-slash");
        var input = $($(this).attr("toggle"));
        if (input.attr("type") == "password") {
        input.attr("type", "text");
        } else {
        input.attr("type", "password");
        }
    });
  
  

  
    function someFun () {
        let resetpass1 = document.querySelector('#pass1');
        let resetpass2 = document.querySelector('#pass2');

        resetpass1.value = '';
        resetpass2.value = '';
    }
    someFun()
  </script>


<script>
    $(document).ready(function(){

        var str_roles = "{{ roles|safe }}";
        var roles = str_roles.split`,`.map(x=>x);
        console.log(roles);
        let target_func = $("#func").text()

        if (target_func == "new"){
            // do nothing
        } else{
            $.each(roles, function (i, item) {

                $("#"+item).prop("checked", true);

            });
        }


    });
    </script>


    <script>

        $('#propall').change(function () {
            if (this.checked) {
                $("#propfield").addClass("dispnone")
            }
            else {
                $("#propfield").removeClass("dispnone")
            }
        });

        $.ajax({
            url: "{{ url_for('api.users') }}",
            type: "get",
            data: {
                target: "props"
            },
            success: function (response) {
                $("#propbed").html(response);
            },
            error: function (xhr) {
                alert("Error")
            }
        });
    </script>


  <script>

    $("#pass1").keyup(function(){

            $(".passmatch").text("passwords match")

            $(".passmatch").removeClass("text-danger")

            }else{

        }

        if($("#inputUsergroup").val() == "Owner"){
            $("#bankdetails").removeClass("dispnone")

<script>
    $("#saveprofile").click(function(){

        var cb = document.getElementById("propall");
        if (cb.checked) {
            var propall = "False";
        } else {
            var propall = "True";
        }

        var proplist = [];
        $.each($("input[name='propcheckbox']:checked"), function () {
            proplist.push($(this).val());
        });

        var houselist = [];
        $.each($("input[name='housecheckbox']:checked"), function () {
            houselist.push($(this).val());
        });


        let target_func = $("#func").text()
        let baseurl = "{{ url_for('api.users') }}"
        let target
        let successResponse
        let afterSuccess

        var new_roles = new Array();

        $('input:checkbox[name=rolecheckbox]:checked').each(function () {
            new_roles.push($(this).val());
        });

        if (target_func == "new"){
            target = "add new user"
            successResponse = "Saved !"
            afterSuccess = "Submit"
            $("#saveprofile").html("submitting...")  
        }else{
            $("#saveprofile").html("updating...")
            target = "update user"
            successResponse = "Updated !"
            afterSuccess = "Update user"
        }

        roles = new_roles.toString()

        console.log("herereeeeee",roles)

        $.ajax({
        url: baseurl,
        type: "POST",
        data: {
            userid:$("#edit_user_identifier").text(),
            status:$("#inputStatus").val(),
            name:$("#inputName").val(),
            email:$("#inputEmail").val(),
            phone:$("#inputTel").val(),
            natid:$("#inputNatid").val(),
            usergroup:$("#inputUsergroup").val(),
            roles:roles,
            bank:$("#bank").val(),
            bankacc:$("#bankacc").val(),
            pass1: $("#pass1").val(),
            pass2: $("#pass2").val(),
            allocation:propall,
            props:proplist.join(", "),
            houses:houselist.join(", "),
            target:target
            },
        success: function(response) {

            $("#workarea").addClass("dispnone")
            $(".alert-msgs").html(response);
            $("#saveprofile").html(successResponse)

            
            setTimeout(function(){
            $("#workarea").removeClass("dispnone")
            $(".alert-msgs").empty();            
            $("#saveprofile").html(afterSuccess)
            $(".reset").click();
            // $('#saveprofile').attr('disabled', 'disabled');
            //   $('#closeeditTenantModal').click();
            //   $('#saveprofile').removeClass('btn-success')
            //   $('#saveprofile').addClass('btn-secondary')
            }, 2500);
            
            // $.ajax({
            //       url: "{{ url_for('api.fetchtenants') }}",
            //       type: "get",
            //       data: {
            //         propid:  $("#prop_identifier").text(),
            //         target:$("#current-reloader").text()
            //       },
            //       success: function(response) {
                    
            //         $("#result-view").html(response);
            //       }
            //     });

            $.ajax({
                url: "/fetch/users",
                type: "get",
                data: {
                  propid:  $("#prop_identifier").text(),
                  target: "new"
                },
                success: function(response) {
                  
                  $("#result-view").html(response);
                }
              });
        }
        });
        



    });
  </script>
