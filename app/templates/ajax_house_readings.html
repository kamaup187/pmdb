              <div class="col-lg-12 no-padding">
                  <div id="reqdata" class="table-responsive">
                      <table id="readingData" class="table shadow" width="100%" cellspacing="0">
                          <thead>
                            <tr>
                            <th class="text-info track-title-cell">Date</th>
                              <th class="text-info font-weight-bold">Period.</th>
                              <th class="text-info font-weight-bold">Meter.</th>
                              <th class="text-info track-title-cell">Prev.</th>
                              <th class="text-info track-title-cell">Curr</th>
                              <th class="text-info track-title-cell">Rate</th>
                              <th class="text-info track-title-cell">Units</th>
                              <th class="text-info track-title-cell">Charge</th>
  
                            </tr>
                          </thead>
                          <tbody>
                            {% for bill in bills%}
                            <tr>
                              <td class="first-data-cell text-dark font-weight-bold">{{ bill['perioddate'] }}</td>
                              <td class="data-cell">{{ bill['period'] }}</td>
                              <td class="data-cell">{{ bill['meter'] }}</td>
                              <td class="data-cell">{{ bill['last_reading'] }}</td>
                              <td class="data-cell">{{ bill['reading'] }}</td>
                              <td class="data-cell">{{ bill['rate'] }}</td>
                              <td class="data-cell">{{ bill['units'] | safe }}</td>
                              <td class="data-cell">{{ bill['charged'] }}</td>
                            </tr>
                          {% endfor %}
                          </tbody>
                      </table>
                  </div>
              </div>

              <script type="text/javascript">
  $(document).ready(function () {
    $('#readingData').DataTable({
      "pagingType": "simple_numbers", // "simple" option for 'Previous' and 'Next' buttons only
      "pageLength": 100,
      "searching":false,
      "order": [[ 0, "desc" ]],
      "bLengthChange": false
    });
    $('.dataTables_length').addClass('bs-select');
    });
</script>
