
<div class="col-lg-12 no-padding">
    <div id="reqdata" class="table-responsive">
      <table id="tenantData" class="table shadow mb-1" width="100%" cellspacing="0">
        <thead class="border-top-info">
            <tr>
              <th class="text-info track-title-cell font-weight-bold ">Name</th>
              <th class="text-info track-title-cell " data-orderable="false">Tel</th>
              <th class="text-info track-title-cell " data-orderable="false">Project(s)</th>
              <th class="text-info track-title-cell " data-orderable="false">Clients</th>
              <th class="text-info track-title-cell " data-orderable="false">Proposals</th>
              <th class="text-info track-title-cell " data-orderable="false">Closed deals</th>

              <th class="text-info track-title-cell " data-orderable="false">Commission</th>

              <th class="text-info track-title-cell text-primary " data-orderable="false">Edit</th>
              <th class="text-info track-title-cell text-danger" data-orderable="false">Remove</th>

            </tr>
          </thead>
          <tbody>
            {% for item in items%}
            <tr>
              <td class="data-cell">{{ item['name'] }}</td>
              <td class="data-cell ">{{ item['tel'] }}</td>  
              <td class="data-cell">{{ item['projects'] |safe }}</td>
              <td class="data-cell">{{ item['clients'] }}</td>
              <td class="data-cell">{{ item['proposals'] }}</td>
              <td class="data-cell">{{ item['closed'] }}</td>


              <td class="data-cell"><span class="text-info font-weight-bold">{{ item['comm'] }}</span></td>


              <td class="text-s data-cell ">
                <div>
                  <button id="{{item['editid']}}" type="button" class="btn action-btn btn-outline-primary font-weight-bold  no-wrap" data-toggle="modal" data-target="#"><i class="fas fa-edit mr-1"></i>Edit</button>
                </div>
              </td>
              <td class="text-s data-cell ">
                <div>
                  <button id="{{item['delid']}}" type="button" class="btn action-btn btn-outline-danger font-weight-bold  no-wrap" data-toggle="modal" data-target="#deleteAttendantModal"><i class="fas fa-trash-alt mr-1"></i>Del</button>
                </div>
              </td>

            </tr>
          {% endfor %}
          </tbody>
          <!-- <tfoot>
            <tr>
              <td colspan="2" class="center-btn font-weight-bold squeeze text-info footer-cell">Grand Total</td>
              <td class="font-weight-bold squeeze text-info footer-cell">{{gtotal}}</td>
            </tr>
          </tfoot> -->
      </table>
    </div>
</div>

<script type="text/javascript">
    $(document).ready(function () {
      $('#tenantData').DataTable({
        "pagingType": "simple_numbers", // "simple" option for 'Previous' and 'Next' buttons only
        "pageLength": 100,
        "searching":false,
        "bLengthChange": false
      });
      $('.dataTables_length').addClass('bs-select');
      });
</script>

<script>
    var rawIds = "{{ groupids|safe }}";
    var ids = rawIds.split`,`.map(x=>x); //adding plus converts the items to numbers
    console.log(ids)
    $.each(ids, function(i,item) {
    
      $("#"+item).on('click',function(){
        console.log("clicked",item)
        if( isNaN(parseInt(item)) ){
          if(item.startsWith("del")){
            $("#del_group_identifier").html(item)
          }else{
            $("#edit_group_identifier").html(item)
          }
          
        }else{
          $("#group_identifier").html(item)
        }
      });
    });
  </script>
