<div id="request-details" class="request-container">
    <div class="mb-3 mt-3">
        <h5 class="mb-0 text-danger text-125 underline">Requested action: {{change.action}}</h5>
    </div>

    <div class="property">
        <label>Request ID:</label>
        <span class="text-black">{{change.ref}}</span>
    </div>
    <div class="property">
        <label>Status:</label>
        <span class="text-black">{{change.status}}</span>
    </div>
    <div class="property">
        <label>Description:</label>
        <span class="text-black">{{change.description}}</span>
    </div>
    <div class="property">
        <label>Date Created:</label>
        <span class="text-black">{{change.created_at}}</span>
    </div>
    <div class="property">
        <label>Requested by:</label>
        <span class="text-black">{{change.requested_by}}</span>
    </div>
</div>
