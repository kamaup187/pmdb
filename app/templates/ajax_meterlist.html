                      </div>
                    </td>
                    <td class="data-cell">
                      <div>
                        <span id="{{i['delid']}}" type="button" class="btn-outline-info ellipsis borderless modalTrigger text-gray-700 {{i['dealloc-disp']}}" data-toggle="modal" data-target="#meterRemovalModal"><i class="fas fa-times mr-1 text-danger"></i> Remove</span>
                      </div>

                </tr>
                {% endfor %}

<script type="text/javascript">
    $(document).ready(function () {
      $('#tenantData').DataTable({
        "pagingType": "simple_numbers", // "simple" option for 'Previous' and 'Next' buttons only
        "pageLength": 100,
        "searching":false,
        columnDefs: [ { targets: 0, type: 'natural' } ],
        "bLengthChange": false
      });
      $('.dataTables_length').addClass('bs-select');
      });
</script>

<script>
    var rawIds = "{{ meterids|safe }}";
    var ids = rawIds.split`,`.map(x=>x); //adding plus converts the items to numbers
    console.log(ids)
    $.each(ids, function(i,item) {
    
      $("#"+item).on('click',function(){
        console.log("clicked",item)
        if( isNaN(parseInt(item)) ){
          if(item.startsWith("del")){
            $("#del_meter_identifier").html(item)
          }else{
            $("#edit_meter_identifier").html(item)
          }
          
        }else{
          $("#meter_identifier").html(item)
        }
      });
    });
  </script>
