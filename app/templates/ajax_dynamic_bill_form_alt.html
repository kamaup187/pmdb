<script>
  $("#editdays").click(function(){ 
    var days = parseInt($("#edit_days").val()); // Convert days to an integer
      var rentAmount = parseFloat($("#edit_rent").val()); // Convert rent to a float

      console.log(days, rentAmount)

      // Check if days and rentAmount are valid numbers
      if (!isNaN(days) && !isNaN(rentAmount)) {
        var proratedRent = Math.round((days / 30) * rentAmount); // Calculate prorated rent and round to nearest whole number
        $("#edit_rent").val(proratedRent); // Set the prorated rent with no decimal places
        $("#edit_days").val('');
        // $("#edit_rent").val((days / 30) * rentAmount); // Calculate and set the prorated rent
        $("#closeDaysModal").click();

      } else {
        alert("Please enter valid numeric values for days and rent amount.");
      }
  });
</script>
