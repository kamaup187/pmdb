<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">

  <title>KiotaPay</title>

  <!-- Custom fonts for this template-->
  <link rel="icon" type="image/png" href="../static/img/kiotafavi.png"/>

  <!-- <link rel=stylesheet type=text/css href="{{ url_for('static', filename='ui.css') }}"> -->
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}">
  <!-- <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet"> -->

  <!-- Custom styles for this template-->
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='eapartment-min.css') }}">
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='kiotapay.css') }}">

</head>

<body class="bg-gradient-primary">

  <div class="container">

    <div class="card o-hidden border-0 shadow-lg my-5">
      <div class="card-body p-0">
        <!-- Nested Row within Card Body -->
        <div class="row">
          <div class="col-lg-5 d-none d-lg-block"></div>
          <div class="col-lg-6">
            <div class="p-5">
              <div class="text-center">
                <h1 class="h4 text-gray-900 mb-4">Welcome {{name}},</h1>
              </div>
              {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                  <div id="alert-msgs"class="noti-fail small show" role="alert">
                      <span><span><i class="fas fa-fw fa-info-circle"></i></span>&nbsp;&nbsp;{{ message }}</span>
                  </div>
              {% endfor %}
              {% endwith %}
              <span class="hide">hide</span>
              <form class="user" method="POST" action="/tenant/signuptwo" autocomplete="off">
                <div class="form-group">
                    <input type="password" class="form-control form-control-user" name="passwordone" placeholder="Set password..." required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control form-control-user" name="passwordtwo" placeholder="Repeat password..." required>
                </div>

                <input id="hiddenvar" style="display: none;" type="text" name="tenantid">

                <button id="signup" class="btn btn-primary btn-user btn-block">
                  Complete registration
                </button>
              </form>
              <hr>
              <div class="text-center">
                <a class="small" href="{{ url_for('api.userlogin') }}">Already have an account? Login!</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bootstrap core JavaScript-->
  <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

  <!-- Core plugin JavaScript-->
  <script src="{{ url_for('static', filename='vendor/jquery-easing/jquery.easing.min.js') }}"></script>

  <!-- Custom scripts for all pages-->
  <script src="{{ url_for('static', filename='eapartment-min.js') }}"></script>
  <script src="{{ url_for('static', filename='jquery.js') }}"></script>

  <script>
    setTimeout(function(){
    $("#alert-msgs").fadeOut(4000,"swing");
    }, 10);
</script>

<script>

    $("#signup").on('click',function(){
        //   $('#signin').html('<span class="spinner-border spinner-border-sm mr-2" role="status" aria-hidden="true"></span>Signin in...');
        $('#signup').html('<i class="fa fa-spinner fa-spin mr-2"></i>Registering...');
        setTimeout(function(){
        $('#signup').html('Complete registration');
        }, 2000);
    })
  
</script>

<script type="text/javascript">
    $(document).ready(function () {
        var sessionvar = {{tenantid|tojson}};
        // alert(sessionvar);
        document.getElementById('hiddenvar').value = sessionvar;
    });
  </script>

</body>

</html>
