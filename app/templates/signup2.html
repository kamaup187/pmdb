  <script>
    $("#register").on('click', function () {
      $('.register').html('<span class="spinner-border spinner-border-sm mr-2 text-dark" role="status" aria-hidden="true"></span>submitting...');
    $.ajax({
      url: "{{ url_for('api.selfuserregisteragent') }}",
      type: "POST",
      data: {
        fname: $("#fname").val(),
        lname: $("#lname").val(),

        tel1: $("#tel1").val(),
        email: $("#email").val(),

        natid:$('#natid').val(),
        addr1 : $('#addr1').val(),

        co : $('#co').val(),
        addr2 : $('#addr2').val(),

        email2:$('#email2').val(),
        tel2 : $('#tel2').val(),

        pass1 : $('#pass1').val()
      },
      success: function (response) {
        if (response === "success") {
          $("#feedback").removeClass("dispnone")
          $("#feedback").html("<h6 class='text-success'><i class='success mr-4'></i><span class='pl-3 pt-3'>Registration successful</span></h6><br><span class='text-info'>Check your email for email address verification</span>");
          $("#regbed").addClass("dispnone")
          $('.register').html('Finish and submit');

        }else if(response === "id taken"){
          $("#feedback").removeClass("dispnone")
          $("#feedback").html("<h6 class='text-danger'>Registration failed: National Id already in use</h6>");
          setTimeout(function () {
            $("#feedback").addClass("dispnone")
          }, 5000);
          $('.register').html('Finish and submit');

        }else if(response === "tel taken"){
          $("#feedback").removeClass("dispnone")
          $("#feedback").html("<h6 class='text-danger'>Registration failed: Mobile number already in use</h6>");
          setTimeout(function () {
            $("#feedback").addClass("dispnone")
          }, 5000);
          $('.register').html('Finish and submit');

        }else if(response === "co taken"){
          $("#feedback").removeClass("dispnone")
          $("#feedback").html("<h6 class='text-danger'>Registration failed: Company name is not available</h6>");
          setTimeout(function () {
            $("#feedback").addClass("dispnone")
          }, 5000);
          $('.register').html('Finish and submit');

        }else{
          $("#feedback").removeClass("dispnone")
          $("#feedback").html("<h6 class='text-danger'>Registration failed: Email already in use</h6>");
          setTimeout(function () {
            $("#feedback").addClass("dispnone")
          }, 5000);
          $('.register').html('Finish and submit');
        }


      }, 
      error: function(xhr) {
        $("#feedback").html("<h3 class='text-danger mb-1 pb-0'>Registration failed</h3><h5 class='text-info mt-1 pt-0'>Please retry below</h5>");
        $('.register').html('Finish and submit');
        $("#feedback").removeClass("dispnone")

        setTimeout(function () {
          $("#feedback").addClass("dispnone")
        }, 5000);

      }
    });
    })
  </script>


<script>
  $("#getdemo").on('click', function () {
    $('.next2').html('<span class="spinner-border spinner-border-sm mr-2 text-dark" role="status" aria-hidden="true"></span>sending...');
  $.ajax({
    url: "{{ url_for('api.requestdemo') }}",
    type: "get",
    data: {
      fname: $("#d_fname").val(),
      lname: $("#d_lname").val(),

      tel1: $("#d_tel1").val(),
      email: $("#d_email").val(),
      target:"params"
    },
    success: function (response) {
      if (response === "success") {
        $("#feedback2").removeClass("dispnone")
        $("#feedback2").html("<h6 class='text-success'><i class='success mr-4'></i><span class='pl-3 pt-3'>Demo link sent successfully</span></h6><br><span class='text-info'>Kindly check your email</span>");
        $("#regbed2").addClass("dispnone")
        $('.next2').html('Get demo');

      }else{
        $("#feedback2").removeClass("dispnone")
        $("#feedback2").html("<h6 class='text-danger'>Error occured, try again later</h6>");
        setTimeout(function () {
          $("#feedback2").addClass("dispnone")
        }, 5000);
        $('.next2').html('Get demo');
      }


    }, 
    error: function(xhr) {
      $("#feedback2").removeClass("dispnone")
      $("#feedback2").html("<h3 class='text-danger mb-1 pb-0'>Error occured</h3><h5 class='text-info mt-1 pt-0'>Please retry below</h5>");
      $('.next2').html('Get demo');

      setTimeout(function () {
        $("#feedback2").addClass("dispnone")
      }, 5000);

    }
  });
  })
</script>
