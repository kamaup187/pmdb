
{% extends "base2.html" %}
{% block content %}

<div class="containe">
    <div class="row">
        <div class="col-lg-6 offset-lg-3">
            <div class="formwrapper">
                <div class="card shadow mb-4 bg-gradient-light">
                    <div class="card-header py-3 bg-gradient-dark divjust-end" >
                        <h6 class="m-0 font-weight-bold text-primary"><span><i class="fas fa-fw fa-person-booth"></i></span>&nbsp;&nbsp;Update tenant info</h6>
                        <a href="{{ url_for('api.index') }}"><span class="text-danger"><i class="fas fa-fw fa-times"></i></span></a>
                    </div>
                    <div class="card-body myforms">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div id="alert-msgs"class="noti-{{ category }} show" role="alert">
                                <span><span><i class="fas fa-fw fa-info-circle"></i></span>&nbsp;&nbsp;{{ message }}</span>
                            </div>
                        {% endfor %}
                        {% endwith %}
                      
                        <span class="hide">hide</span>
                        <form class="center-btn" role="form" method="POST" action="/update/tenant" autocomplete="off">
                          <div class="form-group">
                            <select name="prop" class="form-control" id ="select_prop" required >
                              <option disabled selected value> -- Select property -- </option>
                              {% for o in props %}
                              <option value="{{ o }}">{{ o }}</option>
                              {% endfor %}
                            </select>
                          </div>
                          <div class="form-group" id="select_tenant_ajax">
                            <select name="id" class="form-control" id ="select_tenant" required >
                              <option disabled selected value> -- Select tenant -- </option>
                              {% for o in tenantlist %}
                              <option value="{{ o }}">{{ o }}</option>
                              {% endfor %}
                            </select>
                          </div>
                          <span class="text-warning">Please fill only fields with updates</span>
                          <div class="form-group row">
                            <div class="col-sm-6 mb-3 mb-sm-0">
                                <input class="form-control" type="text" name="name" placeholder="Name">
                            </div>
            
                            <div class="col-sm-6">
                                <input class="form-control" type="email" name="email" placeholder="Email">
                            </div>
                          </div>
                          <!-- <div class="form-group">
                            <input type="text" name="name" class="form-control" id="url-x" placeholder="Name *" >
                          </div> -->
                          <div class="form-group row">
                            <div class="col-sm-6 mb-3 mb-sm-0">
                                <input class="form-control" type="text" name="national_id" placeholder="National_id">
                            </div>
            
                            <div class="col-sm-6">
                                <input class="form-control" type="tel" name="phone" placeholder="Mobile no">
                            </div>
                          </div>

                          <!-- <div class="form-group">
                            <input type="email" name="email" class="form-control" id="urlox" placeholder="email *" >
                          </div> -->
                          <div class="form-group row">
                            <div class="col-sm-6 mb-3 mb-sm-0">
                                <input class="form-control" type="password" name="pass1" placeholder="Password">
                            </div>
            
                            <div class="col-sm-6">
                                <input class="form-control" type="password" name="pass2" placeholder="Confirm Password">
                            </div>
                          </div>
                
                          <hr>
                          <div class="divbg center-btn">
                            <button type="submit" class="bg-gradient-dark borderless text-success"><i class="fas fa-check"></i>&nbsp;Save</button>
                            <button type="button" class="bg-gradient-dark borderless text-warning"onclick="history.back()"><i class="fas fa-arrow-left"></i>&nbsp;Back</button>
                          </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='jquery.js') }}"></script>  

<script>
  setTimeout(function(){
  $("#alert-msgs").fadeOut(500,"swing");
  }, 2000);
</script>

<script>
  $("#select_prop").on('change',function(){
      $.ajax({
              type: "POST",
              url: "{{ url_for('api.updatetenant') }}",
              data: {
                prop:$('#select_prop').val(),
                runtntopt:"somestring"
              },
              success: function(response) {
                  $("#select_tenant_ajax").html(response);
              }
          });
    });
</script>

{% endblock %}
