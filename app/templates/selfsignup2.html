<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">

  <title>KiotaPay</title>

  <!-- Custom fonts for this template-->
  <link rel="icon" type="image/png" href="../static/img/kiotafavi.png"/>

  <!-- <link rel=stylesheet type=text/css href="{{ url_for('static', filename='ui.css') }}"> -->
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}">
  <!-- <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet"> -->

  <!-- Custom styles for this template-->
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='eapartment-min.css') }}">
  <!-- <link rel=stylesheet type=text/css href="{{ url_for('static', filename='kiotapay.css') }}"> -->
  <link rel=stylesheet type=text/css href="{{ url_for('static', filename='mainn.css') }}">


</head>

<body class="bg-primary-custom">

  <div class="container">

    <!-- Outer Row -->
    <div class="row justify-content-center">

      <div class="col-xl-10 col-lg-12 col-md-9">

        <div class="card o-hidden border-0 shadow-lg my-5">
          <div class="card-body p-0">
            <!-- Nested Row within Card Body -->
            <div class="row">
              <div class="col-lg-6 d-none d-lg-block"></div>
              <div class="col-lg-6">
                <div class="p-5">
                  <div class="text-center">
                    <h1 class="h4 text-gray-900 mb-2">Forgot your password?</h1>
                    <p class="mb-1">Well. Just enter your mobile number below and we'll redirect you to set your password</p>
                  </div>
                  {% with messages = get_flashed_messages(with_categories=true) %}
                  {% for category, message in messages %}
                      <div id="alert-msgs"class="noti-{{ category }} show" role="alert">
                          <span class="small"><i class="fas fa-fw fa-info-circle mr-2"></i>{{ message }}</span>
                      </div>
                  {% endfor %}
                  {% endwith %}
                  <span class="hide">hide</span>
                  <form class="user" method="POST" action="/users" autocomplete="off">
                    <div class="form-group">
                      <input type="text" class="form-control form-control-user" name="tel" placeholder="mobile number" required>

                      <input type="text" class="form-control form-control-user d-non" name="target" value="self signup" hidden>

                    </div>
                    <button id="search" class="btn btn cta-button btn-user btn-block">
                      Search
                    </button>
                  </form>
                  <hr>
                  <div class="text-center">
                    <a class="small" href="{{ url_for('api.userlogin') }}">Already have an account? Login!</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap core JavaScript-->
  <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

  <!-- Core plugin JavaScript-->
  <script src="{{ url_for('static', filename='vendor/jquery-easing/jquery.easing.min.js') }}"></script>

  <!-- Custom scripts for all pages-->
  <script src="{{ url_for('static', filename='eapartment-min.js') }}"></script>
  <script src="{{ url_for('static', filename='jquery.js') }}"></script>

  <script>
    setTimeout(function(){
    $("#alert-msgs").fadeOut(4000,"swing");
    }, 10);
</script>

  <script>

    $("#search").on('click',function(){
    //   $('#signin').html('<span class="spinner-border spinner-border-sm mr-2" role="status" aria-hidden="true"></span>Signin in...');
    $('#search').html('<i class="fa fa-spinner fa-spin mr-2"></i>Searching...');
    })
  
</script>

</body>

</html>
