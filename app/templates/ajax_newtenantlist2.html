
<div class="col-lg-12 font-weight-bold text-dark center-btn mb-1 smallify"><span class="text-danger">(pending negotiations)</span> :</div>
<div class="col-lg-12 no-padding">
    <div id="reqdata" class="table-responsive">
        <table id="tenantData" class="table shadow" width="100%" cellspacing="0">
            <thead class="border-top-info">
                <tr>
                <th class="text-info font-weight-bold">Name</th>
                <th class="text-info track-title-cell">Date</th>
                <th class="text-info track-title-cell">Phone</th>
                <th class="text-info track-title-cell ">Email</th>
                <th class="text-info track-title-cell ">Status</th>
                <th class="text-info track-title-cell ">Rep</th>
                <th class="text-info track-title-cell text-success" data-orderable="false">Negotiate</th>
                <th class="text-info track-title-cell text-primary dispnone" data-orderable="false">Edit</th>
                <th class="text-info track-title-cell  text-danger" data-orderable="false">Remove</th>


                </tr>
            </thead>
            <tbody>
                {% for i in items%}
                <tr>
                <td id="{{i['identity']}}" class="data-cell font-weight-bold btn mt-1 action-btn btn-outline-success namebutton no-wrap"><span class="desktop-malaysian">{{ i['hst']|safe }}</span> <span class="mobile-malaysian">{{i['hstalt']|safe}}</span></td>
                <td class="data-cell ">{{ i['booking'] }}</td>
                <td class="data-cell">{{ i['tel'] }}</td>
                <td class="data-cell ">{{ i['email'] }}</td>
                <td class="data-cell ">{{ i['status']|safe }}</td>
                <td class="data-cell ">{{ i['rep'] }}</td>

                <td class="text-s data-cell">
                  <div>
                    <button id="{{i['id']}}" type="button" class="btn action-btn btn-outline-success font-weight-bold  no-wrap" data-toggle="modal" data-target="#negotiationsModal">Negotiate <i class="fas fa-angle-double-right ml-1"></i></button>
                  </div>
                </td>
                <td class="text-s data-cell dispnone">
                  <div>
                    <button id="{{i['editid']}}" type="button" class="btn action-btn btn-outline-primary font-weight-bold  no-wrap" data-toggle="modal" data-target="#editTenantModal"><i class="fas fa-user-edit mr-1"></i>Edit</button>
                  </div>
                </td>
                <td class="text-s data-cell ">
                  <div>
                    <button id="{{i['delid']}}" type="button" class="btn action-btn btn-outline-danger font-weight-bold  no-wrap" data-toggle="modal" data-target="#deleteTenantModal"><i class="fas fa-trash-alt mr-1"></i>Remove</button>
                  </div>
                </td>

                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script type="text/javascript">
    $(document).ready(function () {
      $('#tenantData').DataTable({
        "pagingType": "simple_numbers", // "simple" option for 'Previous' and 'Next' buttons only
        "pageLength": 100,
        "order": [[ 0, "asc" ]],
        "aoColumnDefs": [{ "bSortable": false, "aTargets": [ 1,2,4,5,6 ],type: 'natural' }],
        "searching":false,
        "bLengthChange": false
      });
      $('.dataTables_length').addClass('bs-select');
      });
  </script>

<script>
  var rawIds = "{{ tenantids|safe }}";
  var ids = rawIds.split`,`.map(x=>x); //adding plus converts the items to numbers
  console.log(ids)
  $.each(ids, function(i,item) {
  
    $("#"+item).on('click',function(){
      console.log("clicked",item)
      if( isNaN(parseInt(item)) ){
        if(item.startsWith("del")){
          $("#del_tenant_identifier").html(item)
        }
        else if(item.startsWith("p")){
          $("#tenant_identifier").html(item)
        }
        else if(item.startsWith("tnt")){
          $("#barloader").removeClass("dispnone")
          $.ajax({
            url: "/results",
            type: "get",
            data: {id: item},
            success: function(response) {
              $("#barloader").addClass("dispnone")
              $("#propdisp").addClass("dispnone")
              $("#searchresults").removeClass("dispnone")
              $("#searchresults").html(response);

              $.ajax({
                url: "{{ url_for('api.fetchbills') }}",
                type: "get",
                data: {
                  tenantid: item,
                  target:"tenant bill"
                },
                success: function(response) {
                  
                  $("#search-result-view").html(response);
                }
              });
            }
          });
        }else{
          $("#edit_tenant_identifier").html(item)
        }
        
      }else{
        $("#tenant_identifier").html(item)
      }
    });
  });
</script>
