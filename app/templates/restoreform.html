

<div class="form-group">
    <input class="form-control" type="text" name="name" placeholder="Name">
</div>

<div class="form-group">
    <input class="form-control" type="tel" name="phone" placeholder="07...">
</div>

<div class="form-group">
    <input class="form-control" type="email" name="email" placeholder="email">
</div>

<div class="form-group">
    <input class="form-control" type="text" name="natid" placeholder="National Id">
</div>

<div class="form-group">

</div>

        {% endfor %}
    </select>
