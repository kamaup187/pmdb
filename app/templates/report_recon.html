{% extends 'basereport.html' %}

{% block content %}

<style type="text/css" media="print">

  /* @page{
    size:landscape;
  } */

</style>

<button id="btnDownload" class="btn btn-success btn-sm dispnone">
  <i class="text-white feather-16 font-weight-bold" data-feather="printer"></i><span class="ml-1 text-white">print</span>
</button>

    <div class="col-lg-12 noprint">
        <div class="formwrapper">
            <div class="card bt-none">
              <!-- Card Header - Accordion -->
              <div class="divjust-end bg-light underline">
                
                <a href="#collapseCardExample" class="d-block center-btn no-decor" data-toggle="collapse" role="button" aria-expanded="true" aria-controls="collapseCardExample">
                  <div class="font-weight-bold text-black pt-1">
                    <span class="ml-lg-4 font-weight-bold text-uppercase">Select below</span>
                    <span><i class="fas fa-chevron-down ml-3"></i></span>
                  </div>
                </a>

                <button class="btn btn-success btn-sm mt-2 mb-2 mr-2" data-toggle="modal" data-target="#addRecordModal">
                  <i class="text-white feather-16 font-weight-bold" data-feather="edit"></i><span class="ml-1 text-white">Add record</span>
                </button>

              </div>
              <!-- Card Content - Collapse -->
              <div class="" id="collapseCardExample">
                <div class="card-body pt-0">
                    <form class="bg-white">

                      <div class="row">
                        <div class="col-lg-3 form-group mb-2 ml-lg-5">
                          <label class="mb-0">Select account:</label>
                          <select name="reconaccount" class="select-css" id="reconaccount">
                            <option selected value="collected">Main account</option>
                          </select>
                        </div>
                      
                        <div class="col-lg-3 form-group input-icons">
                          <span class="divjust-end">
                            <span class="text-danger font-weight-bold">Start date</span>
                            <!-- <span class="text-black font-weight-bold dispnone">(10 AM)</span> -->
                          </span>
                          <div id="datepicker7" class="date" data-date-format="dd-mm-yyyy">
                            <input id="checkindate" class="form-control ph" name="shiftstart" type="text" placeholder="Select date" readonly />
                            <!-- <span class="input-group-addon field-icon">(10 AM)</span> -->
                            <input class="form-contro ph" type="time" id="begin" min="00:00" max="24:00" value="00:00">
  
                          </div>
                        </div>
  
                        <div class="col-lg-3 form-group input-icons">
                          <span class="divjust-end">
                            <span class="text-danger font-weight-bold">End date</span>
                            <!-- <span class="text-black font-weight-bold dispnone">(10 AM)</span> -->
                          </span>
                          <div id="datepicker7" class="date" data-date-format="dd-mm-yyyy">
                            <input id="checkoutdate" class="form-control ph" name="shiftend" type="text" placeholder="Select date" readonly />
                            <!-- <span class="input-group-addon field-icon">(10 AM)</span> -->
                            <input class="form-contro ph" type="time" id="end" min="00:00" max="24:00" value="23:59">
  
                          </div>
                        </div>
                      
                        <div class="col-lg-2 form-group mb-2">
                          <button id="view_general" type="button" class="form-control viewbtn font-weight-bold btn btn-primary btn-sm mt-4">View</button>
                        </div>
                      </div>


                    </form>
                </div>
              </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/feather.min.js') }}"></script>

    <div id="reportbase" class="row"></div>
    <div class="modal fade" id="addRecordModal" tabindex="-1" role="dialog" aria-labelledby="paymentDetailModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="indicator"></div>
          <div class="modal-header pb-0 text-center">
            <h5 class="modal-title text-info" id="paymentDetailModalLabel">Add transaction record</h5>
            <span id="update-reloader" class="dispnone"></span>
            <div class="alert-msgs"></div>
          </div>
          <div class="modal-body pt-0">
            <div class="media mb-2">
              <div class="media-body">
                <div class="position-relative">
                  <div class="card-body modal-forms">
                    <form autocomplete="off" method="POST" action="">
     
                      <div class="form-group">
                        <label for="transaction-date">Transaction Date</label>
                        <input type="date" class="form-control" id="trans-date" name="transaction-date" required>
                      </div>

                      <div class="form-group text-black">
                        <label for="reference">Reference</label>
                        <input type="text" class="form-control" id="trans-ref" name="reference" placeholder="Enter reference" required>
                    </div>

                    <!-- Amount Field -->
                    <div class="form-group text-black">
                        <label for="amount">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="trans-amount" name="amount" placeholder="Enter amount" required>
                    </div>

                    <!-- Payment Type Field -->
                    <div class="form-group text-black">
                        <label>Payment Type</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentType" id="trans-debit" value="debit" required>
                            <label class="form-check-label" for="debit">Debit</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentType" id="trans-credit" value="credit" required>
                            <label class="form-check-label" for="credit">Credit</label>
                        </div>
                    </div>

                    <!-- Description Field -->
                    <div class="form-group text-black">
                        <label for="description">Description</label>
                        <textarea class="form-control" id="trans-desc" name="description" rows="3" placeholder="Enter a description"></textarea>
                    </div>
 
                    </form>
                    <div class="mt-3">
                      <button class="btn btn-light reset dispnone" type="reset" data-dismiss="modal"></i>Dismiss</button>
                      <button id="submit-transaction" class="btn malibu-bg btn-sm form-control font-weight-bold text-white" type="button"> <span> Submit</span> </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

<!-- <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script> -->
<script src="{{ url_for('static', filename='js/datepicker.js') }}"></script>

<script>

$("#checkindate").datepicker({
    autoclose: true,
    todayHighlight: true,
    format: "DD, dd-mm-yyyy"
  }).on('changeDate', function (e) {
    var checkin = $(this).datepicker('getDate')
    checkin.setDate(checkin.getDate() + 1);
    $("#checkoutdate").datepicker("setDate", checkin); //set default checkoutdate
  });

  $("#checkoutdate").datepicker({
    autoclose: true,
    format: "DD, dd-mm-yyyy"
  });


  var date = new Date();
  date.setDate(date.getDate());
  $("#checkindate").datepicker("setDate", date); //set default checkindate

  date.setDate(date.getDate() + 1);
  $("#checkoutdate").datepicker("setDate", date); //set default checkoutdate
</script>

<script>
  
  $("#view_general").click(function () {
      $("#preloader-btn").click();
      $.ajax({
          url: "/recon/report",
          type: "post",
          data: {
              start: $("#checkindate").val(),
              end: $("#checkoutdate").val(),
              tstart:$("#begin").val(),
              tend:$("#end").val(),
              reconaccount: $("#reconaccount").val()
          },
          success: function (response) {
              $("#reportbase").html(response)
              $("#postloader-btn").click();

          }
      });
    
  });

  $("#submit-transaction").click(function () {
    $(this).text("submitting...");
      $.ajax({
          url: "/recon/account",
          type: "post",
          data: {
              date: $("#trans-date").val(),
              ref: $("#trans-ref").val(),
              amount:$("#trans-amount").val(),
              type:$('input[name="paymentType"]:checked').val(),
              desc: $("#trans-desc").val()
          },
          success: function (response) {
              console.log(response);
              $("#submit-transaction").text("Submit");

              $("#preloader-btn").click();
              $.ajax({
                  url: "/recon/report",
                  type: "post",
                  data: {
                      start: $("#checkindate").val(),
                      end: $("#checkoutdate").val(),
                      tstart:$("#begin").val(),
                      tend:$("#end").val(),
                      reconaccount: $("#reconaccount").val()
                  },
                  success: function (response) {
                      $("#reportbase").html(response)
                      $("#postloader-btn").click();

                  }
              });


          }
      });
    
  });
  feather.replace()
</script>


{% endblock %}
