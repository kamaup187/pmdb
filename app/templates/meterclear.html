{% extends 'base2.html' %}

{% block content %}

<div class="containe">
  <div class="row">
    <div class="col-lg-6 offset-lg-3 no-padding">
      <div class="formwrapper">
        <div class="card shadow mb-4 bg-light">
          <div class="card-header py-2 topbar-bg divjust-end" >
            <h6 class="m-0 font-weight-bold text-info"><span><i class="fas fa-fw fa-faucet mr-2"></i></span>Meter deallocation</h6>
            <a href="{{ url_for('api.index') }}"><span class="text-danger"><i class="fas fa-fw fa-times"></i></span></a>
          </div>
          <div class="card-body myforms">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                  <div id="alert-msgs"class="noti-{{ category }} show" role="alert">
                      <span><span><i class="fas fa-fw fa-info-circle"></i></span>&nbsp;&nbsp;{{ message }}</span>
                  </div>
              {% endfor %}
            {% endwith %}
            
            <span class="hide">hide</span>
            <form autocomplete="off" method="POST" action="/clear/meter">
              
              <div class="form-group">
                <select name="usergroup" class="form-control" id ="select_apartment" >
                  <option disabled selected value> -- Select Apartment -- </option>
                  {% for o in apartments %}
                  <option value="{{ o }}">{{ o }}</option>
                  {% endfor %}
                </select>
              </div>

              <div id="apartment"class="form-group bg-gradient-dark center-btn">
                <span class="text-white"><i class="fas fa-fw fa-info-circle"></i>&nbsp;&nbsp;Apartment: </span><span class="text-success makebig">{{apartment_name}}</span>
              </div>

              <div class="form-group">
                <select name="house" class="form-control" id ="select_house" required >
                  <option disabled selected value> -- Select House -- </option>
                  {% for o in houselist %}
                  <option value="{{ o }}">{{ o }}</option>
                  {% endfor %}
                </select>
              </div>

              <div id="notifications"></div>


              <div class="form-group">
                <input class="form-control" type="text" name="desc" placeholder="Description...(optional)">
              </div>
              <input id="apvar" style="display: none;" type="text" name="apartmentsessionvariable">

              <div class="divbg center-btn">
                  <button type="submit" class="bg-light borderless text-success"><i class="fas fa-check"></i>&nbsp;Clear</button>
                  <!-- <button type="button" class="bg-gradient-dark borderless"><a class="text-info" href="{{ url_for('api.createmeter') }}"><i class="fas fa-clock"></i>&nbsp;Meters</a></button> -->
                  <button type="button" class="bg-light borderless text-warning"onclick="history.back()"><i class="fas fa-arrow-left"></i>&nbsp;Back</button>
              </div>
                
            </form>
          </div>
        </div>
      </div><br>
    </div>
  </div>
</div>


<script src="{{ url_for('static', filename='jquery.js') }}"></script>

<script>
  setTimeout(function(){
  $("#alert-msgs").fadeOut(500,"swing");
  }, 2000);
</script>

<script>
$("#select_apartment").on('change',function(){
    var apartmentvar = $("#select_apartment").val();
    localStorage.setItem('apartmentvar',apartmentvar);
    var sessionapvar = localStorage.getItem('apartmentvar');
    console.log(sessionapvar);
    document.getElementById('apvar').value = sessionapvar;

    $.ajax({
            type: "POST",
            url: "{{ url_for('api.meterremoval') }}",
            data: {
              apartmentsessionvariable: localStorage.getItem('apartmentvar'),
              runhseopt:"somestring"
            },
            success: function(response) {
                $("#select_house").html(response);
            }
        });
});
</script>

<script>

  $("#select_apartment").on('change',function(){
    setTimeout(function(){
      $.ajax({
              type: "POST",
              url: "{{ url_for('api.meterremoval') }}",
              data: {
                apartmentsessionvariable: localStorage.getItem('apartmentvar'),
                runapartnm:"somestring"
              },
              success: function(response) {
                  $("#apartment").html(response);
              }
          });
        },0);
    });
</script>


<script>

  $("#select_house").on('change',function(){
      $.ajax({
              type: "POST",
              url: "{{ url_for('api.meterremoval') }}",
              data: {
                  apartmentsessionvariable: localStorage.getItem('apartmentvar'),
                  house: $("#select_house").val(),
                  runalert:"somestring"
              },
              success: function(response) {
                  $("#notifications").html(response);
              }
          });
    });

</script>
<script>
  var sessionapvar = localStorage.getItem('apartmentvar');
  console.log(sessionapvar);
  document.getElementById('apvar').value = sessionapvar;
</script>
{% endblock %}
