{% extends "base.html" %}

{% block content %}
<div class="column is-4 is-offset-4">
    <p class="formtitle">Create a new User group</p>
    <div class="box">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
            <div class="notification {{ category }} alert-dismissible fade show" role="alert">
                <span>{{ message }}</span>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endfor %}
      {% endif %}
      {% endwith %}
        <form method="POST" action="/add/usergroup">
            <div class="field">
                <div class="control">
                    <input class="input is-large" type="text" name="name" placeholder="name" autofocus>
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <input class="input is-large" type="text" name="description" placeholder="description">
                </div>
            </div>

            <button class="button is-block is-info is-large is-fullwidth">Create group</button>
        </form>
    </div>
</div>
{% endblock %}
