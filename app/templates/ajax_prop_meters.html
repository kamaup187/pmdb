      <div id="result-view" class="">
        <div id="props" class="table-responsive">
          <table id="tenantPaymentData" class="table shadow mb-1" width="100%" cellspacing="0">
              <thead class="custom-header">
                  <tr>
                      <th class="text-black font-weight-bold pl-0">Property</th>
                      <th class="text-black font-weight-bold">Houses</th>
                      <th class="text-black font-weight-bold">Meters</th>
                      <th class="text-black font-weight-bold">READINGS</th>
                      <th class="text-black font-weight-bold">UNREAD</th>
                      <th class="text-black font-weight-bold">AMOUNT</th>
                      <th class="text-black font-weight-bold">MONTH</th>

                      <th class="text-primary">INVOICE</th>
                      <th class="text-danger">DISCARD</th>
                  </tr>
              </thead>
              <tbody>
                  {% for item in items%}
                  <tr>


                      <td class="data-cell">
                          <div>
                              <span id="{{item['id']}}" type="button" class="btn btn-outline-primary btn-sm ellipsis2 text-left no-wrap">{{item['name']}}</span>
                          </div>
                      </td>
                      
          
                      <td id="houseinfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>
                      <td id="meterinfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>
                      <td id="readinginfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>
                      <td id="unreadinfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>
                      <td id="amountinfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>
                      <td id="monthinfo-{{item['id']}}" class="data-cell"><div class="dot-elastic mt-2"></div></td>

          
                      <td class="data-cell">
                          <div>
                              <span id="{{item['editid']}}" type="button" class="btn btn-outline-primary btn-sm ellipsis"
                                  data-toggle="modal" data-bs-toggle="modal" data-target="#" disabled> 
                                  <i class="feather-18 text-black mr-1 pb-1" data-feather="plus-circle"></i> add invoice</span>
                          </div>
                      </td>
                      <td class="data-cell">
                          <div>
                              <span id="{{item['identity']}}" type="button" class="btn btn-outline-primary btn-sm ellipsis"
                                  data-toggle="modal" data-bs-toggle="modal" data-target="#" disabled>
                                  <i class="feather-18 text-danger mr-1 pb-1" data-feather="trash"></i>delete</span>
                          </div>
                      </td>
                  </tr>
                  {% endfor %}
              </tbody>
          </table>
        </div>

      </div>

      <div id="barloader-alt" class="load-bar-alt mb-1 dispnone">
        <div class="bar-alt"></div>
        <div class="bar-alt"></div>
        <div class="bar-alt"></div>
      </div>

      <div id="child-view" class="dispnone"></div>

<script>

  $("#uploadPropModal").on('shown.bs.modal', function () {
    $(".dismissparent").click();
  });

</script>

<script>
  var rawIds = "{{ propids|safe }}";
  // var props = "{{ propnames|safe }}";
  // var propnames= props.replace(/'/g,'"');
  // propObjs = JSON.parse(propnames)

  var ids = rawIds.split`,`.map(x => x); //adding plus converts the items to numbers
  console.log(ids)
  $.each(ids, function (i, item) {

    $("#" + item).on('click', function () {
      console.log("clicked", item)
      if (isNaN(parseInt(item))) {
        if (item.startsWith("del")) {
          $("#del_prop_identifier").html(item)
        }
        else if (item.startsWith("prp")) {
          console.log("working here>>>>>>>>>>>>>>>>>>>>>>>>")

          $("#prop_id_identifier").html(item)


        } else {
          $("#edit_prop_identifier").html(item)
        }

      } else {
        console.log("working >>>>>>>>>>>>>>>>>>>>>>>>")

        $("#activeprop").html('<i class="fas fa-chevron-right mr-3"></i><span id="activeprop-child"></span></span>')
        
          $("#activeprop-child").text($(this).text())

          $("#title-loader").addClass("title-loading");$("#title-loader").removeClass("title-loaded");
          $("#dummyData").removeClass('dispnone');
          $("#propdisp-content").addClass('dispnone');


          showSpin()
          $.ajax({
              type: "get",
              url: "{{ url_for('api.metermanagement') }}",
              data: {
                  propid:item
              },
              success: function(response) {
                $("#result-view").addClass("dispnone");
                $("#child-view").removeClass("dispnone")

                $("#title-loader").removeClass("title-loading");$("#title-loader").addClass("title-loaded");
                $("#dummyData").addClass('dispnone');
                $("#propdisp-content").removeClass('dispnone');



                $("#child-view").html(response);
              }
          });

        $("#prop_identifier").html(item)
        var linkTarget = $("#" + item).children("span").text()
        $("#link_identifier").html(linkTarget)

      }
    });


    // showSpin()


    if (isNaN(parseInt(item))){
      //do nothing
    }else{
      $.ajax({
      url: "{{ url_for('api.readingstats') }}",
      type: "get",
      data: {
            propid: item
          },
      success: function(response) {
        $("#houseinfo-" + item ).text(response[0]);
        $("#meterinfo-" + item ).text(response[1]);
        $("#readinginfo-" + item ).text(response[2]);
        $("#unreadinfo-" + item ).text(response[3]);
        $("#amountinfo-" + item ).text(response[4]);
        $("#monthinfo-" + item ).text(response[5]);

      }
    });
    }



  });



</script>
