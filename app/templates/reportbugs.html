{% extends "base2.html" %}

{% block content %}
<div class="column is-4 is-offset-4">
    <p class="formtitle">Report a problem</p>
    <div class="box">
        <form method="POST" action="/report/bug">
            <div class="field">
                <div class="control">
                    <input class="input is-large" type="text" name="description" placeholder="Post your issue here" autocomplete="off"required autofocus="">
                </div>
            </div>
            <button class="button is-block is-info is-large is-fullwidth">Report</button>
        </form>
    </div>
</div>
<div class="col-sm-5 col-sm-offset-1">
    <div>
      <h3>Notifications</h3>
    </div>
    {% if msgs %}
    <div class="notification is-success">
      {{msgs}}
    </div>
    {% endif %}
    
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="notification is-danger">
      {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}
</div>
{% endblock %}
