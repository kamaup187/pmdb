{% extends "base2.html" %}

{% block content %}

<div class="row">

    <div id="header-strip" class="col-lg-12 no-padding">
        <div class="card-header py-2 card-bg divjust-end" >
            <h6 class="m-0 font-weight-bold text-white"><span><i class="fas fa-fw fa-clipboard-check mr-3"></i></span>New Clients</h6>
            <a href="{{ url_for('api.index') }}"><span class="text-white"><i class="fas fa-fw fa-times"></i></span></a>
        </div>
    </div>

    <div class="col-lg-12 no-padding">
        <div id="reqdata" class="table-responsive">
            <table id="newUserData" class="table shadow no-margin-bottom " width="100%" cellspacing="0">
                <thead>
                  <tr>
                    <th class="text-info font-weight-bold">Name</th>
                    <th class="text-info track-title-cell">Phone</th>
                    <th class="text-info track-title-cell">Email</th>
                    <th class="text-info track-title-cell">Group</th>
                    <th class="text-info track-title-cell">Company</th>
                    <th class="text-info track-title-cell">Date</th>
                    <th class="text-info track-title-cell mobile-malaysia">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {% for item in items%}
                  <tr>
                    <td class="track-data-cell">{{ item['name'] }}</td>
                    <td class="track-data-cell">{{ item['tel'] }}</td>
                    <td class="track-data-cell">{{ item['email'] }}</td>
                    <td class="track-data-cell">{{ item['group'] }}</td>
                    <td class="track-data-cell">{{ item['company'] }}</td>
                    <td class="track-data-cell mobile-malaysia">{{ item['date_reg'] }}</td>
                    <td class="track-data-cell">
                      <button id="{{item['id']}}" type="button" class="borderless btn-secondary modalTrigger" data-toggle="modal" data-target="#approveModal">Action</button>
                    </td>
                  </tr>
                {% endfor %}
                </tbody>        
            </table>
        </div>
    </div>
</div>

<div class="text-center">

  <div class="modal fade" id="approveModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="indicator"></div>
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">User Status</h5>
        </div>
        <div class="modal-body">
          <div class="media mb-2">
            <div class="media-body">

              <div class="position-relative">

                <form class="divb" action="" method="POST">
                  <div class="form-group">
                    <select class="select-css" id ="selected_action">
                      <option disabled selected value> Select action </option>
                      <option value="approved">Activate</option>
                      <option value="rejected">Pending</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <input id="desc" name="desc" class="form-control" placeholder="Description">
                  </div>
                </form>

              </div>
            </div>
          </div>
        </div>

        <div class="modal-foote divbg">
          <button id="submitmodalThree" type="button" class="btn bg-gradient-success borderless text-white btn-sm has-margin-bottom">Submit</button>
          <button type="button" id="closemodalThree" class="btn btn-danger btn-sm has-margin-bottom" data-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="{{ url_for('static', filename='jquery.js') }}"></script>  
<script>
    setTimeout(function(){
    $("#alert-msgs").fadeOut(30000,"swing");
    }, 10000);
</script>

<script type="text/javascript">
  $(document).ready(function () {
    $('#newUserData').DataTable({
      "pagingType": "simple_numbers", // "simple" option for 'Previous' and 'Next' buttons only
      "pageLength": 10,
      "searching":false,
      "bLengthChange": false
    });
    $('.dataTables_length').addClass('bs-select');
    });
</script>

<script>
  var requestIdData = {{ userids|tojson }};
  
  $.each(requestIdData, function(i,item) {
  
    $("#"+item).on('click',function(){
      console.log(item);
      localStorage.setItem('expensevar',item);
     
    });
  });
</script>

<script>
  $("#submitmodalThree").on('click',function(){
    $("#closemodalThree").click();

    setTimeout(function(){
      url2 = "{{ url_for('api.viewnewclients') }}";
      $.ajax({
            type: "POST",
            url: url2,
            data: {
              action:$("#selected_action").val(),
              desc:$("#desc").val(),
              expenseid:localStorage.getItem('expensevar'),

              run:"expenseapproval"
            },
            success: function(response) {
              // $("#detailed-payments").toggleClass('invoice dispnone');
              // $("#payments-report").toggleClass('row dispnone');
              
              $("#reqdata").html(response);
          }
      });
    },1000);
});
</script>


{% endblock %}
