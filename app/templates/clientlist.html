<script type="text/javascript">
    $(document).ready(function () {
      $("#barloader").removeClass("dispnone")

      $.ajax({
      url: "{{ url_for('api.fetchclients') }}",
      type: "GET",
      data: {
          date:"",
          target:"clients"
          },
      success: function(response) {
        $("#propdisp").html(response)


        $("#barloader").addClass("dispnone")


      },
      error: function(xhr) {
        $("#barloader").addClass("dispnone")

      }
    });

    });
  
  </script>
